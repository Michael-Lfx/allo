name: Artifact delivery integrity

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    paths:
      - ".cargo/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain*"
      - "crates/agent/nomi-agent/**"
      - "crates/agent/nomi-mcp/**"
      - "crates/agent/nomi-tools/**"
      - "crates/agent/nomi-types/**"
      - "crates/backend/nomifun-ai-agent/**"
      - "crates/backend/nomifun-app/Cargo.toml"
      - "crates/backend/nomifun-app/src/**"
      - "crates/backend/nomifun-agent-execution/**"
      - "crates/backend/nomifun-channel/**"
      - "crates/backend/nomifun-conversation/**"
      - "crates/backend/nomifun-creation/**"
      - "crates/backend/nomifun-db/src/lib.rs"
      - "crates/backend/nomifun-db/src/repository/conversation.rs"
      - "crates/backend/nomifun-db/src/repository/creation_task.rs"
      - "crates/backend/nomifun-db/src/repository/sqlite_conversation.rs"
      - "crates/backend/nomifun-db/src/repository/sqlite_creation_task.rs"
      - "crates/backend/nomifun-db/tests/conversation_repository.rs"
      - "apps/desktop/Cargo.toml"
      - "apps/desktop/src/relocate.rs"
      - "ui/src/common/api/OpenAI2GeminiConverter*"
      - "ui/src/common/chat/**"
      - "ui/src/common/types/platform/acpTypes.ts"
      - "ui/src/common/utils/localPath*"
      - "ui/src/renderer/components/Markdown/**"
      - "ui/src/renderer/components/media/LocalImageView.tsx"
      - "ui/src/renderer/pages/conversation/Messages/**"
      - "ui/src/renderer/pages/conversation/platforms/**"
      - "ui/src/renderer/pages/workshop/generation/**"
      - "ui/package.json"
      - "ui/tsconfig*.json"
      - "package.json"
      - "bun.lock"
      - ".github/workflows/artifact-delivery.yml"

permissions:
  contents: read

env:
  CARGO_INCREMENTAL: "0"
  NOMIFUN_EMBED_BUN: "0"

jobs:
  verify-ui:
    name: Verify artifact UI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-24.04]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install JavaScript dependencies
        run: bun install --frozen-lockfile

      - name: Test cross-platform path and renderer contracts
        working-directory: ui
        run: >-
          bun test
          src/common/api/OpenAI2GeminiConverter.test.ts
          src/common/utils/localPath.test.ts
          src/common/chat/imageGenCore.test.ts
          src/common/chat/chatLib.test.ts
          src/common/chat/normalizeToolCall.test.ts
          src/renderer/pages/workshop/generation/taskArtifacts.test.ts
          src/renderer/pages/workshop/generation/spawn.test.ts
          src/renderer/pages/workshop/generation/useGenerationRun.test.ts
          src/renderer/pages/conversation/Messages/components/toolGroupArtifactVisibility.test.ts
          src/renderer/pages/conversation/Messages/components/messageFileMarker.test.ts
          src/renderer/pages/conversation/Messages/components/MessageText.structure.test.ts
          src/renderer/pages/conversation/Messages/hooks.mergeFetchedMessages.test.ts
          src/renderer/pages/conversation/platforms/localImageWorkspace.structure.test.ts

      - name: Type-check artifact event and renderer contracts
        working-directory: ui
        run: bun run typecheck

  verify-rust:
    name: Verify artifact Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Cold Windows builds compile aws-lc/ring and the full agent dependency
    # graph. Keep UI work in its own job and allow enough time for a first run.
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-24.04]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install Linux desktop test dependencies
        if: runner.os == 'Linux'
        run: >-
          sudo apt-get update &&
          sudo apt-get install -y
          libwebkit2gtk-4.1-dev
          libayatana-appindicator3-dev
          librsvg2-dev
          libxdo-dev
          patchelf

      - name: Check Rust formatting
        if: runner.os == 'Linux'
        run: cargo fmt --all -- --check

      - name: Test Nomi engine and sink fail-closed contracts
        run: cargo test -p nomi-agent --lib --test engine_test --locked

      - name: Test creation artifact validation and transactions
        run: cargo test -p nomifun-creation --lib --locked

      - name: Test creation-task persistence invariants
        run: cargo test -p nomifun-db sqlite_creation_task --lib --locked

      - name: Test atomic conversation artifact commits
        run: >-
          cargo test -p nomifun-db
          --test conversation_repository
          artifact_message_commit
          --locked

      - name: Test Nomi generic artifact transport
        run: cargo test -p nomi-mcp tool_proxy --lib --locked

      - name: Test Nomi and ACP artifact lifecycle
        run: >-
          cargo test -p nomifun-ai-agent
          --lib
          --test acp_module_surface
          --test agent_types_integration
          --features test-support
          --locked

      - name: Test channel artifact projection
        run: cargo test -p nomifun-channel stream_relay --lib --locked

      - name: Test channel stream projection integration
        run: cargo test -p nomifun-channel --test stream_relay_test --locked

      - name: Test conversation artifact persistence and historical revalidation
        run: cargo test -p nomifun-conversation --lib --locked

      - name: Test conversation stream persistence integration
        run: cargo test -p nomifun-conversation --test stream_relay_tool_call --locked

      - name: Test managed conversation workspace cleanup barrier
        run: >-
          cargo test -p nomifun-conversation
          --test conversation_crud
          delete_removes_managed_auto_workspace
          --locked

      - name: Test task-attempt artifact receipts
        run: cargo test -p nomifun-agent-execution --lib --locked

      - name: Test Workshop native atomic persistence
        run: cargo test -p nomifun-app workshop_bridge --lib --locked

      - name: Test desktop data-root relocation and link handling
        run: cargo test -p nomifun-desktop relocate --locked
