name: UX visual baseline

on:
  pull_request:
    paths:
      - 'ui/src/renderer/styles/**'
      - 'ui/src/renderer/pages/commercialSlice/**'
      - 'ui/src/renderer/utils/motion/**'
      - 'ui/src/renderer/utils/analytics/**'
      - 'ui/src/renderer/utils/featureFlags/**'
      - 'ui/src/renderer/components/layout/Router.tsx'
      - 'scripts/ux-visual-baseline.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ux-visual-baseline:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - name: Install workspace deps
        run: bun install --frozen-lockfile
      - name: Run UX visual baseline gate
        run: bun scripts/ux-visual-baseline.mjs
